# =============================================================================
# BrumKit — Local Development Infrastructure
# Services: PostgreSQL, Redis, Mailhog
# Usage: docker compose --env-file .env.development up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: bk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-broom_kit}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brumkit

  # ---------------------------------------------------------------------------
  # Redis 7 — Rate limiting / sessions / caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bk-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brumkit

  # ---------------------------------------------------------------------------
  # Mailhog — Local SMTP catcher
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bk-mailhog
    restart: unless-stopped
    ports:
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
      - '${MAILHOG_UI_PORT:-8025}:8025'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:8025',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brumkit

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: bk-postgres-data
  redis_data:
    name: bk-redis-data

# =============================================================================
# Networks
# =============================================================================
networks:
  brumkit:
    name: bk-network
    driver: bridge

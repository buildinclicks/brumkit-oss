# =============================================================================
# BrumKit — Production Docker Compose
# Run: docker-compose -f docker/docker-compose.yml up --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: bk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-broom_kit}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brumkit

  # ---------------------------------------------------------------------------
  # Redis 7 — Rate limiting / sessions / caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bk-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brumkit

  # ---------------------------------------------------------------------------
  # Mailhog — Local SMTP catcher (swap for SES / Resend in production)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: bk-mailhog
    restart: unless-stopped
    ports:
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
      - '${MAILHOG_UI_PORT:-8025}:8025'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:8025',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brumkit

  # ---------------------------------------------------------------------------
  # Web — Next.js app (built from monorepo root Dockerfile)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .. # monorepo root (where Dockerfile lives)
      dockerfile: Dockerfile
    container_name: bk-web
    restart: unless-stopped

    # Runtime env vars — these are NOT baked into the image at build time.
    # Copy .env.production.example → .env.production and fill in real values,
    # then reference them here via ${VAR} or use env_file.
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database (points to the postgres service above)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-broom_kit}?sslmode=disable

      # Auth.js
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}

      # Redis (internal service URL)
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379

      # Email
      USE_MAILHOG: ${USE_MAILHOG:-true}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@brumkit.local}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@brumkit.local}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@brumkit.local}
      RESEND_API_KEY: ${RESEND_API_KEY:-}

      # Public env vars (embedded in client bundle — must be set at BUILD time
      # too if you want them in client JS; see next.config.js notes below)
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}

      # Cron
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET must be set}

    ports:
      - '${WEB_PORT:-3000}:3000'

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - brumkit

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: bk-postgres-data
  redis_data:
    name: bk-redis-data

# =============================================================================
# Networks — isolate brumkit services from unrelated containers
# =============================================================================
networks:
  brumkit:
    name: bk-network
    driver: bridge
